<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALCULATOR</title>
     <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="utils.css">
</head>
<body align="center">
    <h1 class="text-center">CALCULATOR</h1>
    <div class="container flex flex-col mx-auto m-w-20 items-center">
        <input class="input" id="screen" type="text"/>
        <div class="row">
            <button div class="button">C</button>
            <button div class="button" id="del">**</button>
            <button div class="button" >%</button>
            <button div class="button">/</button>
        </div>
        <div class="row">
            <button div class="button">7</button>
            <button div class="button">8</button>
            <button div class="button">9</button>
            <button div class="button">*</button>
        </div>
        <div class="row">
            <button div class="button">4</button>
            <button div class="button">5</button>
            <button div class="button">6</button>
            <button div class="button">-</button>
        </div>
        <div class="row">
            <button div class="button">1</button>
            <button div class="button">2</button>
            <button div class="button">3</button>
            <button div class="button">+</button>
        </div>
        <div class="row">
            <button div class="button">00</button>
            <button div class="button">0</button>
            <button div class="button">.</button>
            <button div class="button">=</button>
        </div>
    </div>
    
    <script src="index.js"></script>
</body>
</html>
